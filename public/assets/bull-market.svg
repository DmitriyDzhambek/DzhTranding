<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Градиент тёплого янтаря -->
    <linearGradient id="bull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2535;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2A3040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F2D3D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Янтарное свечение -->
    <radialGradient id="amber" cx="50%" cy="25%" r="60%">
      <stop offset="0%" style="stop-color:#E9C46A;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#E76F51;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    
    <!-- Восходящие волны -->
    <filter id="wave">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="25"/>
    </filter>
    
    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Основной фон -->
  <rect width="1920" height="1080" fill="url(#bull)"/>
  
  <!-- Янтарное свечение сверху -->
  <rect width="1920" height="1080" fill="url(#amber)"/>
  
  <!-- Восходящие линии тренда -->
  <path d="M0,800 L320,750 L640,700 L960,600 L1280,500 L1600,400 L1920,350" 
        fill="none" stroke="#E9C46A" stroke-width="1" opacity="0.15" filter="url(#glow)"/>
  <path d="M0,850 L320,810 L640,770 L960,680 L1280,580 L1600,480 L1920,420" 
        fill="none" stroke="#E76F51" stroke-width="0.8" opacity="0.1" filter="url(#glow)"/>
  <path d="M0,900 L320,870 L640,840 L960,760 L1280,670 L1600,570 L1920,500" 
        fill="none" stroke="#E9C46A" stroke-width="0.6" opacity="0.08"/>
  
  <!-- Тёплые волны -->
  <path d="M0,400 Q240,390 480,400 T960,400 T1440,400 T1920,400" 
        fill="none" stroke="#E9C46A" stroke-width="1.5" opacity="0.12" filter="url(#wave)"/>
  <path d="M0,500 Q240,490 480,500 T960,500 T1440,500 T1920,500" 
        fill="none" stroke="#E76F51" stroke-width="1" opacity="0.08" filter="url(#wave)"/>
  
  <!-- Солнечные лучи -->
  <ellipse cx="960" cy="150" rx="500" ry="250" fill="#E9C46A" opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="960" cy="250" rx="400" ry="200" fill="#E76F51" opacity="0.03" filter="url(#glow)"/>
  
  <!-- Искры/частицы -->
  <circle cx="400" cy="500" r="2" fill="#E9C46A" opacity="0.2"/>
  <circle cx="600" cy="450" r="1.5" fill="#E76F51" opacity="0.15"/>
  <circle cx="1300" cy="480" r="2.5" fill="#E9C46A" opacity="0.18"/>
  <circle cx="1500" cy="520" r="1.8" fill="#E76F51" opacity="0.12"/>
  <circle cx="800" cy="550" r="2" fill="#E9C46A" opacity="0.15"/>
  <circle cx="1100" cy="470" r="1.5" fill="#E76F51" opacity="0.2"/>
  <circle cx="200" cy="600" r="2" fill="#E9C46A" opacity="0.1"/>
  <circle cx="1700" cy="580" r="2.2" fill="#E76F51" opacity="0.14"/>
  
  <!-- Подсветка снизу -->
  <ellipse cx="960" cy="1050" rx="1000" ry="80" fill="#1A2535" opacity="0.4"/>
</svg>
