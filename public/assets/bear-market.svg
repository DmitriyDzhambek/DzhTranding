<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Ледяной градиент -->
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090F1C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1528;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111B30;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ледяное свечение -->
    <radialGradient id="frost" cx="50%" cy="70%" r="60%">
      <stop offset="0%" style="stop-color:#4A0E4E;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#219EBc;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    
    <!-- Ледяные кристаллы -->
    <filter id="crystal">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.02" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15"/>
    </filter>
    
    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Основной фон -->
  <rect width="1920" height="1080" fill="url(#ice)"/>
  
  <!-- Ледяное свечение снизу -->
  <rect width="1920" height="1080" fill="url(#frost)"/>
  
  <!-- Ледяные трещины/линии -->
  <path d="M0,300 L480,350 L960,320 L1440,380 L1920,340" 
        fill="none" stroke="#4A0E4E" stroke-width="0.8" opacity="0.15" filter="url(#glow)"/>
  <path d="M0,500 L480,480 L960,520 L1440,490 L1920,510" 
        fill="none" stroke="#219EBc" stroke-width="0.6" opacity="0.1" filter="url(#glow)"/>
  <path d="M0,700 L480,720 L960,690 L1440,710 L1920,700" 
        fill="none" stroke="#4A0E4E" stroke-width="0.5" opacity="0.08"/>
  
  <!-- Ледяные кристаллы -->
  <polygon points="300,400 310,380 320,400 310,420" fill="#219EBc" opacity="0.1" filter="url(#glow)"/>
  <polygon points="800,500 812,475 824,500 812,525" fill="#4A0E4E" opacity="0.08" filter="url(#glow)"/>
  <polygon points="1300,450 1308,435 1316,450 1308,465" fill="#219EBc" opacity="0.12" filter="url(#glow)"/>
  <polygon points="1600,550 1610,530 1620,550 1610,570" fill="#4A0E4E" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Звёзды/холодные частицы -->
  <circle cx="200" cy="300" r="1.5" fill="#8ECAE6" opacity="0.2"/>
  <circle cx="500" cy="250" r="1" fill="#4A0E4E" opacity="0.15"/>
  <circle cx="1100" cy="280" r="2" fill="#8ECAE6" opacity="0.18"/>
  <circle cx="1500" cy="320" r="1.2" fill="#4A0E4E" opacity="0.12"/>
  <circle cx="700" cy="350" r="1.8" fill="#8ECAE6" opacity="0.15"/>
  <circle cx="1700" cy="400" r="1.3" fill="#4A0E4E" opacity="0.1"/>
  <circle cx="100" cy="500" r="1.5" fill="#8ECAE6" opacity="0.12"/>
  <circle cx="1800" cy="480" r="1.6" fill="#4A0E4E" opacity="0.14"/>
  <circle cx="950" cy="200" r="2" fill="#8ECAE6" opacity="0.2"/>
  
  <!-- Ледяная поверхность -->
  <ellipse cx="960" cy="1000" rx="1200" ry="120" fill="#090F1C" opacity="0.5"/>
  <path d="M0,950 Q480,930 960,950 T1920,950" fill="none" stroke="#219EBc" stroke-width="1" opacity="0.1"/>
</svg>
